services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: sqlserver://${SQLSERVER_HOST:-host.docker.internal}:${SQLSERVER_PORT:-1433};database=${SQLSERVER_DB:-fleet_management};user=${SQLSERVER_USER:-fleet_user};password=${SQLSERVER_PASSWORD:-change_me};encrypt=true;trustServerCertificate=true;schema=dbo
    ports:
      - '${BACKEND_PORT:-3001}:3001'

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    depends_on:
      - backend
